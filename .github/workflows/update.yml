name: update-dashboard

on:
  schedule:
    - cron: "30 1 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance requests pandas mplfinance
      - run: python daily_dashboard.py
        env:
          OUT_FILE: index.html
      - name: commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "update dashboard" || echo "no change"
          git push
